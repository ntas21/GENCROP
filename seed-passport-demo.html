<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENCROP Seed Passport</title>

<style>
body{
background:#020802;
font-family:Arial,sans-serif;
color:#39ff14;
margin:0;
padding:30px;
}

.card{
max-width:700px;
margin:auto;
background:#061206;
border:1px solid #39ff14;
border-radius:20px;
padding:30px;
box-shadow:0 0 30px rgba(57,255,20,0.15);
}

h1{
font-size:42px;
margin-bottom:10px;
}

.status{
display:inline-block;
padding:8px 14px;
border-radius:20px;
background:#39ff14;
color:#000;
font-weight:bold;
margin-bottom:25px;
}

.section{
margin-top:25px;
padding-top:15px;
border-top:1px solid rgba(57,255,20,0.2);
}

.label{
color:#7fff7f;
font-size:14px;
margin-bottom:5px;
}

.value{
font-size:18px;
font-weight:bold;
}

.footer{
margin-top:30px;
font-size:14px;
color:#8a8a8a;
text-align:center;
}
</style>
</head>

<body>

<div class="card">

<h1>🌱 Seed Passport</h1>

<div class="status">
AI VERIFIED
</div>

<div class="section">
<div class="label">Crop Type</div>
<div class="value">Anatolian Wheat</div>
</div>

<div class="section">
<div class="label">Region</div>
<div class="value">Gaziantep, Turkey</div>
</div>

<div class="section">
<div class="label">Soil Type</div>
<div class="value">Clay-Loam</div>
</div>

<div class="section">
<div class="label">Humidity</div>
<div class="value">62%</div>
</div>

<div class="section">
<div class="label">Temperature</div>
<div class="value">28°C</div>
</div>

<div class="section">
<div class="label">AI Confidence Score</div>
<div class="value">97.4%</div>
</div>

<div class="section">
<div class="label">Blockchain Status</div>
<div class="value">Ready for Solana Mint</div>
</div>

<div class="section">
<div class="label">Passport ID</div>
<div class="value">GENCROP-2026-0001</div>
</div>

<div class="footer">
GENCROP • Decentralized Agricultural Science Protocol
</div>

</div>

</body>
</html>
